<div class="wrapper">
    <div class="container">
        <div class="hero-section">
            <h1>Welcome to NESA Learning</h1>
            <p>Enhance your skills and knowledge with our comprehensive online learning platform. Access quality courses and interactive resources anytime, anywhere.</p>
        </div>
        
        <div class="login-section">
            <h2>Quick Login</h2>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" autocomplete="username" formControlName="username" placeholder="Enter your username" >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" autocomplete="current-password" id="password" formControlName="password" placeholder="Enter your password">
                </div>
                
                <button type="submit" [disabled]="loginForm.invalid" class="login-btn">Login</button>
            </form>
            
            <div class="divider">Don't have an account?</div>
            
            <div class="register-section">
                <p>Create a new account to get started</p>
                <a href="/register">
                    <button type="button" class="register-btn">Register Now</button>
                </a>
            </div>
        </div>
    </div>
</div>
<footer>
    <section class="footer-section">
        <p>© 2026 NESA Learning</p>
        <!-- <ul>
            <li>Privacy Policy</li>
            <li>Terms of Service</li>
            <li>Contact Us</li>
        </ul> -->
    </section>
</footer>
